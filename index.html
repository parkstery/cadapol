<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao VWorld GIS Ver.2</title>
    <!-- Mixed Content 에러 해결: 모든 HTTP 요청을 HTTPS로 강제 업그레이드 -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Kakao Maps API - HTTPS 명시 및 필수 라이브러리 포함 -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=8d2d116d6a534a98e73133808f5843a6&libraries=services,clusterer,drawing&autoload=false"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #app { height: 100%; width: 100%; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark-glass { background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>

    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/"
      }
    }
    </script>
</head>
<body>
    <div id="app"></div>
    <!-- 상대 경로 명시로 CORS/경로 에러 방지 -->
    <script type="module" src="./index.tsx"></script>
</body>
</html>
